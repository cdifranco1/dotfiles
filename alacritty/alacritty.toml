# alacritty.toml

[window]
# Set window dimensions (columns, lines)
dimensions = { columns = 100, lines = 30 }

# Start in maximized mode
startup_mode = "Maximized"

# Window padding (x, y)
padding = { x = 10, y = 10 }

# Whether the window should have borders and title bar
decorations = "Full"

[font]
# Normal (roman) font face
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }

# Bold font face
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }

# Italic font face
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }

# Font size in points
size = 14.5

[colors.primary]
background = "0xfdf6e3"
foreground = "0x657b83"

[colors.normal]
black   = "0x073642"
red     = "0xdc322f"
green   = "0x859900"
yellow  = "0xb58900"
blue    = "0x268bd2"
magenta = "0xd33682"
cyan    = "0x2aa198"
white   = "0xeee8d5"

[colors.bright]
black   = "0x002b36"
red     = "0xcb4b16"
green   = "0x586e75"
yellow  = "0x657b83"
blue    = "0x839496"
magenta = "0x6c71c4"
cyan    = "0x93a1a1"
white   = "0xfdf6e3"

[cursor]
style = { shape = "Block", blinking = "On" }

[keyboard]
bindings = [
  # Example: Ctrl+Shift+T to spawn a new terminal window
  { key = "T", mods = "Control|Shift", action = "SpawnNewInstance" },
]

